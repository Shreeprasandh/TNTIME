services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: tntime-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tntime
      POSTGRES_USER: tntime_user
      POSTGRES_PASSWORD: tntime_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tntime_user -d tntime"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
